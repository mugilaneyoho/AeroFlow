
services:
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - authentication-service
      - institute-service
      - telecalling-service
      - training-service
    networks:
      - app-network
    
  authentication-service:
    build:
      context: ./services/authentication
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - PORT_GRPC=3001
      - DB_HOST=auth-db
      - DB_PORT=3306
      - DB_NAME=auth
      - DB_USER=auth
      - DB_PASS=123456
    depends_on:
      - auth-db
    networks:
      - app-network
    
  institute-service:
    build:
      context: ./services/institute
      dockerfile: Dockerfile
    ports:
      - "3004:3004"
      - "3003:3003"
    environment:
      - PORT=3004
      - PORT_GRPC=3003
      - AUTH_GRPC=3001
      - DB_HOST=institute-db
      - DB_PORT=3306
      - DB_NAME=institute
      - DB_USER=institute
      - DB_PASS=123456
    depends_on:
      - institute-db
    networks:
      - app-network
    
  telecalling-service:
    build:
      context: ./services/telecalling
      dockerfile: Dockerfile
    ports:
      - "3006:3006"
    environment:
      - PORT=3006
      - AUTH_GRPC=3001
      - PAY_GRPC=3011
      - DB_HOST=telecalling-db
      - DB_PORT=3306
      - DB_NAME=telecalling
      - DB_USER=telecalling
      - DB_PASS=123456
    depends_on:
      - telecalling-db
      - redis
      - kafka
    networks:
      - app-network
  
  training-service:
    build:
      context: ./services/training
      dockerfile: Dockerfile
    ports:
      - "3008:3008"
    environment:
      - PORT=3008
      - AUTH_GRPC=3001
      - INSTITUTE_GRPC=3003
      - DB_HOST=training-db
      - DB_PORT=3306
      - DB_NAME=training
      - DB_USER=training
      - DB_PASS=123456
    depends_on:
      - training-db
    networks:
      - app-network

  payment-service:
    build:
      context: ./services/payment
      dockerfile: Dockerfile
    ports:
      - "3011:3011"
    environment:
      - GRPC_PORT=3011
      - DB_HOST=payment-db
      - DB_PORT=3306
      - DB_NAME=payment
      - DB_USER=payment
      - DB_PASS=123456
    depends_on:
      - payment-db
    networks:
      - app-network
  
  mail-service:
    build:
      context: ./services/mailservice
      dockerfile: Dockerfile
    ports:
      - "3012:3012"
    environment:
      - name=value
    networks:
      - app-network

  reception-service:
    build:
      context: ./services/reception
      dockerfile: Dockerfile
    ports:
      - "3013:3013"
    environment:
      - name=value
    networks:
      - app-network

  notifyandlogs:
    build:
      context: ./services/notifiyandlogs
      dockerfile: Dockerfile
    ports:
      - "3015:3015"
    environment:
      - name=value
    networks:
      - app-network

  auth-db:
    image: mysql:9.6.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth
      MYSQL_USER: auth
      MYSQL_PASSWORD: 123456
    volumes:
      - auth_data:/var/lib/mysql
    networks:
      - app-network
  
  institute-db:
    image: mysql:9.6.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: institute
      MYSQL_USER: institute
      MYSQL_PASSWORD: 123456
    volumes:
      - institute_data:/var/lib/mysql
    networks:
      - app-network
  
  telecalling-db:
    image: mysql:9.6.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: telecalling
      MYSQL_USER: telecalling
      MYSQL_PASSWORD: 123456
    volumes:
      - telecalling_data:/var/lib/mysql
    networks:
      - app-network
  
  training-db:
    image: mysql:9.6.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: training
      MYSQL_USER: training
      MYSQL_PASSWORD: 123456
    volumes:
      - training_data:/var/lib/mysql
    networks:
      - app-network
  
  payment-db:
    image: mysql:9.6.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: payment
      MYSQL_USER: payment
      MYSQL_PASSWORD: 123456
    volumes:
      - payment_data:/var/lib/mysql
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    ports:
    - "9092:9092"     
    - "29092:29092"    
    environment:
      # KRaft mode
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Logs
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - app-network
      
  # kafka-2:
  #   image: confluentinc/cp-kafka:latest
  #   ports:
  #     - "9094:9094"
  #   environment:
  #     - KAFKA_PROCESS_ROLES=broker,controller
  #     - KAFKA_NODE_ID=1
  #     - KAFKA_LISTENERS=PLAINTEXT://:9094,CONTROLLER://:9095
  #     - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9094
  #     - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
  #     - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9094
  #     - KAFKA_LOG_DIRS=/tmp/kraft-combined-logs
  #     - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1

  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    # volumes:
    #   - redis-data:/data
    # command: redis-server --appendonly yes 


networks:
  app-network:

volumes:
  auth_data:
  institute_data:
  telecalling_data:
  training_data:
  payment_data:    