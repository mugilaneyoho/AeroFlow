syntax = "proto3";

package common;

service CommonService {
    rpc GetDashBoard (Empty) returns (res);
}

message Empty {}

message resdata {
    string batch_name = 1;
}

message res {
    int32 TotalCourse = 1;
    int32 ActiveBatch = 2;
    int32 TotalStudent = 3;
    repeated resdata BatchList = 4;
}