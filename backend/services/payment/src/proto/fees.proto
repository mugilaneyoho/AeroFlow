syntax = "proto3";

package fees;

service FeeManagement {
rpc GetFeeSummary (GetFeeSummaryRequest) returns (FeeSummaryResponse);
rpc GetPaymentHistory (GetPaymentHistoryRequest) returns (PaymentHistoryResponse);
}

message GetFeeSummaryRequest {
string student_id = 1;
}

message FeeSummaryResponse {
double total_fees = 1;
double paid_fees = 2;
double pending_amount = 3;
}

message GetPaymentHistoryRequest {
string student_id = 1;
}

message PaymentRecord {
string transaction_id = 1;
string date = 2; // Mapped to pay.createdAt.toISOString() in TS
double amount = 3;
string method = 4; // e.g., "UPI", "Card"
string status = 5; // e.g., "Success", "Pending"
}

message PaymentHistoryResponse {
repeated PaymentRecord records = 1;
}