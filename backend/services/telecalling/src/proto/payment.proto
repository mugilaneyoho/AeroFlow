syntax = "proto3";

package payment;

service PaymentService {
    rpc CreatePayment (CreatePaymentRequest) returns (CommonResponse);
    rpc GetAllPayment (Empty) returns (GetAllPaymentResponse);
}

message CreatePaymentRequest {
    int32 admissionFees = 1;
    string paymentDate = 2;
    string paymentMode = 3;
    string transactionId = 4;
    string telecallerId = 5;
    string studentId = 6;
    string remarks = 7;
}

message Empty {}

message PaymentData {
    string uuid = 1;
    int32 amount = 2;
    string payment_date = 3;
    string receipt_number = 4;
    string transaction_id = 5;
    string collected_by = 6;
    string student_id = 7;
    string student_name = 8;
    string notes = 9;
}

message CommonResponse {
    bool success = 1;
    string message = 2;
}

message GetAllPaymentResponse {
    bool success = 1;
    string message = 2;
    repeated PaymentData data = 3;
}
