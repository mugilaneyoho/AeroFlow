syntax = "proto3";

package telecaller_auth;

service TelecallingService {
  rpc CreateUser (CreateUserRequest) returns (User);
  rpc FindOne (UserById) returns (User);
}

message CreateUserRequest {
  string email = 1;
  string password = 2;
  string profileId = 3;
}

message UserById {
  int32 id = 1;
}

message User {
  bool success = 1;
  string message = 2;
}
