
#### 1. Authentication Service
- User authentication & authorization
- Role-based access control (RBAC)
- Token management

#### 2. Institute Service
- Institute configuration
- Course & department management
- Master data handling

#### 3. Telecalling Service
- Lead lifecycle management
- Call logs & follow-ups
- Telecaller assignment logic

#### 4. Training Service
- Batch & class allocation
- Trainer management
- Student training records

#### 5. Reception Service
- Walk-in admissions
- Student onboarding
- Front-desk operations

---

## 🔄 Inter-Service Communication

- **Protocol**: gRPC
- **Async Jobs**: Bull queues
- **Cache / Queue Backend**: Redis

Used for:
- Lead assignment
- Notifications
- Background processing
- High-performance data exchange

